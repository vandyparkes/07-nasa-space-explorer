<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NASA Space Explorer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700&display=swap"
    rel="stylesheet"
  />
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>
  <!-- Plaid: horizontal weft + vertical warp, multiplied (SVG in DOM, not CSS url(#pattern)) -->
  <div class="palette-bg-layer" aria-hidden="true">
    <svg xmlns="http://www.w3.org/2000/svg" class="palette-bg-svg" preserveAspectRatio="none">
      <defs>
        <pattern
          id="plaid-weft"
          width="84"
          height="84"
          patternUnits="userSpaceOnUse"
          patternTransform="scale(1.142857142857143)"
        >
          <rect width="84" height="14" x="0" y="0" style="--palette-i: 0" />
          <rect width="84" height="14" x="0" y="14" style="--palette-i: 1" />
          <rect width="84" height="14" x="0" y="28" style="--palette-i: 2" />
          <rect width="84" height="14" x="0" y="42" style="--palette-i: 3" />
          <rect width="84" height="14" x="0" y="56" style="--palette-i: 4" />
          <rect width="84" height="14" x="0" y="70" style="--palette-i: 5" />
        </pattern>
        <pattern
          id="plaid-warp"
          width="84"
          height="84"
          patternUnits="userSpaceOnUse"
          patternTransform="scale(1.142857142857143)"
        >
          <rect width="14" height="84" x="0" y="0" style="--palette-i: 6" />
          <rect width="14" height="84" x="14" y="0" style="--palette-i: 7" />
          <rect width="14" height="84" x="28" y="0" style="--palette-i: 8" />
          <rect width="14" height="84" x="42" y="0" style="--palette-i: 9" />
          <rect width="14" height="84" x="56" y="0" style="--palette-i: 10" />
          <rect width="14" height="84" x="70" y="0" style="--palette-i: 11" />
        </pattern>
      </defs>
      <rect width="100%" height="100%" fill="url(#plaid-weft)" />
      <rect class="plaid-warp-overlay" width="100%" height="100%" fill="url(#plaid-warp)" />
    </svg>
  </div>
  <div class="container">
    <header class="site-header">
      <img src="img/nasa-worm-logo.png" alt="NASA Logo" class="logo" />
      <h1>Space Explorer</h1>
    </header>

    <div class="filters">
      <div class="filters-stage">
        <div class="cosmic-backdrop" aria-hidden="true">
          <span class="galaxy galaxy--spiral"></span>
          <span class="galaxy galaxy--barred"></span>
          <span class="galaxy galaxy--elliptical"></span>
        </div>
        <div class="filters-orbit">
        <ul class="solar-system solar-system--orbit" aria-label="The solar system: Sun and planets in order">
          <li class="solar-item">
            <span class="solar-item-inner">
              <span class="solar-node solar-node--sun" title="Sun"></span>
              <span class="solar-label">Sun</span>
            </span>
          </li>
          <li class="solar-item">
            <span class="solar-item-inner">
              <span class="solar-node solar-node--mercury" title="Mercury"></span>
              <span class="solar-label">Mercury</span>
            </span>
          </li>
          <li class="solar-item">
            <span class="solar-item-inner">
              <span class="solar-node solar-node--venus" title="Venus"></span>
              <span class="solar-label">Venus</span>
            </span>
          </li>
          <li class="solar-item">
            <span class="solar-item-inner">
              <span class="solar-node solar-node--earth" title="Earth"></span>
              <span class="solar-label">Earth</span>
            </span>
          </li>
          <li class="solar-item">
            <span class="solar-item-inner">
              <span class="solar-node solar-node--mars" title="Mars"></span>
              <span class="solar-label">Mars</span>
            </span>
          </li>
          <li class="solar-item">
            <span class="solar-item-inner">
              <span class="solar-node solar-node--jupiter" title="Jupiter"></span>
              <span class="solar-label">Jupiter</span>
            </span>
          </li>
          <li class="solar-item">
            <span class="solar-item-inner">
              <span class="solar-node solar-node--saturn" title="Saturn"></span>
              <span class="solar-label">Saturn</span>
            </span>
          </li>
          <li class="solar-item">
            <span class="solar-item-inner">
              <span class="solar-node solar-node--uranus" title="Uranus"></span>
              <span class="solar-label">Uranus</span>
            </span>
          </li>
          <li class="solar-item">
            <span class="solar-item-inner">
              <span class="solar-node solar-node--neptune" title="Neptune"></span>
              <span class="solar-label">Neptune</span>
            </span>
          </li>
        </ul>
        <div class="filters-controls filters-hub">
          <button type="button" id="fetchButton" class="planet-field planet-field--action">
            Get Space Images
          </button>
        </div>
        </div>
      </div>
      <div class="filters-date-calendar" role="group" aria-label="APOD date range">
        <span class="filters-date-calendar__heading">Date range</span>
        <div class="filters-date-calendar__row">
          <input type="date" id="startDate" class="planet-field planet-field--start" aria-label="Start date" />
          <span class="filters-date-calendar__sep" aria-hidden="true">→</span>
          <input type="date" id="endDate" class="planet-field planet-field--end" aria-label="End date" />
        </div>
      </div>
    </div>

    <div id="gallery" class="gallery">
      <div class="placeholder">
        <p class="placeholder-ready">Are you ready?</p>
      </div>
    </div>
  </div>

  <div
    id="apodModal"
    class="modal"
    hidden
    role="dialog"
    aria-modal="true"
    aria-labelledby="modalTitle"
  >
    <div class="modal-backdrop" data-modal-close tabindex="-1" aria-hidden="true"></div>
    <div class="modal-panel">
      <button type="button" class="modal-close" data-modal-close aria-label="Close dialog">
        &times;
      </button>
      <div class="modal-media" id="modalMedia"></div>
      <h2 id="modalTitle" class="modal-title"></h2>
      <p id="modalDate" class="modal-date"></p>
      <p id="modalExplanation" class="modal-explanation"></p>
    </div>
  </div>

  <button type="button" id="backToTop" class="back-to-top" hidden aria-label="Back to top">
    <span class="back-to-top__rocket" aria-hidden="true">🚀</span>
  </button>

  <script src="js/dateRange.js"></script>
  <script src="js/config.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
