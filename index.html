<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NASA Space Explorer</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>
  <!-- Pattern painted inside SVG (not CSS url(#pattern)): reliable + vars from stylesheet -->
  <div class="palette-bg-layer" aria-hidden="true">
    <svg xmlns="http://www.w3.org/2000/svg" class="palette-bg-svg" preserveAspectRatio="none">
      <defs>
        <pattern
          id="palette-squares-pattern"
          width="84"
          height="84"
          patternUnits="userSpaceOnUse"
          patternTransform="scale(1.142857142857143)"
        >
          <rect width="14" height="14" x="0" y="0" style="--palette-i: 0" />
          <rect width="14" height="14" x="14" y="0" style="--palette-i: 1" />
          <rect width="14" height="14" x="28" y="0" style="--palette-i: 2" />
          <rect width="14" height="14" x="42" y="0" style="--palette-i: 3" />
          <rect width="14" height="14" x="56" y="0" style="--palette-i: 4" />
          <rect width="14" height="14" x="70" y="0" style="--palette-i: 5" />
          <rect width="14" height="14" x="0" y="14" style="--palette-i: 6" />
          <rect width="14" height="14" x="14" y="14" style="--palette-i: 7" />
          <rect width="14" height="14" x="28" y="14" style="--palette-i: 8" />
          <rect width="14" height="14" x="42" y="14" style="--palette-i: 9" />
          <rect width="14" height="14" x="56" y="14" style="--palette-i: 10" />
          <rect width="14" height="14" x="70" y="14" style="--palette-i: 11" />
          <rect width="14" height="14" x="0" y="28" style="--palette-i: 12" />
          <rect width="14" height="14" x="14" y="28" style="--palette-i: 13" />
          <rect width="14" height="14" x="28" y="28" style="--palette-i: 14" />
          <rect width="14" height="14" x="42" y="28" style="--palette-i: 15" />
          <rect width="14" height="14" x="56" y="28" style="--palette-i: 16" />
          <rect width="14" height="14" x="70" y="28" style="--palette-i: 17" />
          <rect width="14" height="14" x="0" y="42" style="--palette-i: 18" />
          <rect width="14" height="14" x="14" y="42" style="--palette-i: 19" />
          <rect width="14" height="14" x="28" y="42" style="--palette-i: 20" />
          <rect width="14" height="14" x="42" y="42" style="--palette-i: 21" />
          <rect width="14" height="14" x="56" y="42" style="--palette-i: 22" />
          <rect width="14" height="14" x="70" y="42" style="--palette-i: 23" />
          <rect width="14" height="14" x="0" y="56" style="--palette-i: 24" />
          <rect width="14" height="14" x="14" y="56" style="--palette-i: 25" />
          <rect width="14" height="14" x="28" y="56" style="--palette-i: 26" />
          <rect width="14" height="14" x="42" y="56" style="--palette-i: 27" />
          <rect width="14" height="14" x="56" y="56" style="--palette-i: 28" />
          <rect width="14" height="14" x="70" y="56" style="--palette-i: 29" />
          <rect width="14" height="14" x="0" y="70" style="--palette-i: 30" />
          <rect width="14" height="14" x="14" y="70" style="--palette-i: 31" />
          <rect width="14" height="14" x="28" y="70" style="--palette-i: 32" />
          <rect width="14" height="14" x="42" y="70" style="--palette-i: 33" />
          <rect width="14" height="14" x="56" y="70" style="--palette-i: 34" />
          <rect width="14" height="14" x="70" y="70" style="--palette-i: 35" />
        </pattern>
      </defs>
      <rect width="100%" height="100%" fill="url(#palette-squares-pattern)" />
    </svg>
  </div>
  <div class="container">
    <header class="site-header">
      <img src="img/nasa-worm-logo.png" alt="NASA Logo" class="logo" />
      <h1>Space Explorer</h1>
    </header>

    <div class="filters">
      <input type="date" id="startDate" class="planet-field planet-field--start" aria-label="Start date" />
      <input type="date" id="endDate" class="planet-field planet-field--end" aria-label="End date" />
      <button type="button" id="fetchButton" class="planet-field planet-field--action">
        Get Space Images
      </button>
    </div>

    <div id="gallery" class="gallery">
      <div class="placeholder">
        <div class="placeholder-icon">🔭</div>
        <p>Select a date range and click "Get Space Images" to explore the cosmos!</p>
      </div>
    </div>
  </div>

  <div
    id="apodModal"
    class="modal"
    hidden
    role="dialog"
    aria-modal="true"
    aria-labelledby="modalTitle"
  >
    <div class="modal-backdrop" data-modal-close tabindex="-1" aria-hidden="true"></div>
    <div class="modal-panel">
      <button type="button" class="modal-close" data-modal-close aria-label="Close dialog">
        &times;
      </button>
      <div class="modal-media" id="modalMedia"></div>
      <h2 id="modalTitle" class="modal-title"></h2>
      <p id="modalDate" class="modal-date"></p>
      <p id="modalExplanation" class="modal-explanation"></p>
    </div>
  </div>

  <script src="js/dateRange.js"></script>
  <script src="js/config.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
